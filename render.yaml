# Blueprint Render: API Node desde el monorepo (rama main).
# Dashboard → New → Blueprint → conecta este repo; completa las variables marcadas sync: false.
# DATABASE_URL = cadena de conexión de Supabase (Settings → Database en Supabase).

services:
  - type: web
    name: tecnofan-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: apps/api
    buildCommand: npm install && npm run db:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: uploads
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
